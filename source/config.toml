base_url = "/"
title = "Pexiora Tennis de Table"
description = "Site web vitrine du club de tennis de table de Pexiora, au coeur de l'Ouest Audois."
author = "Dev'Oc"

# Configuration du thème et de la langue
default_language = "fr"
generate_feeds = true
feed_filenames = ["feed.xml"]
compile_sass = true
minify_html = true
build_search_index = true

[extra]
short_title = "Pexiora TT"

# Configuration Markdown
[markdown]
render_emoji = true
external_links_target_blank = true
external_links_no_follow = true
external_links_no_referrer = true
smart_punctuation = true

[markdown.highlighting]
light_theme = "github-light"
dark_theme = "github-dark"

# Configuration des liens
[link_checker]
internal_level = "error"
external_level = "warn"

# Taxonomies
taxonomies = [
  { name = "tags", feed = true },
  { name = "categories", feed = true },
]
